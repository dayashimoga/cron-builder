<!DOCTYPE html>
<html lang="en" data-theme="dark"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cron Builder — Visual Expression Creator | QuickUtils</title>
    <meta name="keywords" content="QuickUtils, cron, builder, code, design, productivity, online tools">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://quickutils.top/cron-builder/">
    <meta property="og:title" content="Cron Builder — Visual Expression Creator | QuickUtils">
    <meta property="og:description" content="Build cron expressions visually, see human-readable descriptions, preview next executions, and explore common presets.">
    <meta property="og:url" content="https://quickutils.top/cron-builder/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
<meta name="description" content="Build cron expressions visually, see human-readable descriptions, preview next executions, and explore common presets.">
<link rel="stylesheet" href="style.css"></head>
<body><nav class="navbar"><div class="container nav-inner"><a href="https://quickutils.top" class="brand">🕐 Cron Builder</a><div class="nav-links"><button id="themeBtn" class="theme-btn">🌙</button></div></div></nav>
<main class="container" style="margin-top:1.5rem">
<div class="hero glass-card text-center"><h1 class="gradient-text">Cron Expression Builder</h1><p class="text-muted">Build, understand, and test cron schedules visually</p></div>
<div class="grid-2" style="margin-top:1rem">
    <section class="glass-card">
        <h3>📝 Expression</h3>
        <input type="text" id="cronInput" value="0 9 * * 1-5" class="cron-input" spellcheck="false">
        <div id="cronDesc" class="cron-desc"></div>
        <hr style="border-color:var(--border);margin:1rem 0">
        <h3>🎛 Visual Builder</h3>
        <div class="field-row"><label>Minute<select id="minute"><option value="*">Every minute (*)</option><option value="0" selected>0</option><option value="*/5">Every 5 min</option><option value="*/10">Every 10 min</option><option value="*/15">Every 15 min</option><option value="*/30">Every 30 min</option></select></label>
        <label>Hour<select id="hour"><option value="*">Every hour (*)</option><option value="0">0 (midnight)</option><option value="6">6 AM</option><option value="9" selected>9 AM</option><option value="12">12 PM</option><option value="18">6 PM</option><option value="*/2">Every 2 hours</option><option value="*/4">Every 4 hours</option></select></label></div>
        <div class="field-row"><label>Day of Month<select id="dom"><option value="*" selected>Every day (*)</option><option value="1">1st</option><option value="15">15th</option><option value="1,15">1st & 15th</option></select></label>
        <label>Month<select id="month"><option value="*" selected>Every month (*)</option><option value="1">January</option><option value="6">June</option><option value="12">December</option><option value="1,4,7,10">Quarterly</option></select></label></div>
        <label>Day of Week<select id="dow"><option value="*">Every day (*)</option><option value="1-5" selected>Weekdays (Mon-Fri)</option><option value="0,6">Weekends</option><option value="1">Monday</option><option value="5">Friday</option></select></label>
        <button class="btn btn-primary w-full" id="buildBtn" style="margin-top:.75rem">Build Expression</button>
    </section>
    <section class="glass-card">
        <h3>⏭ Next Executions</h3>
        <div id="nextRuns" class="next-runs"></div>
        <hr style="border-color:var(--border);margin:1rem 0">
        <h3>📅 Calendar Heatmap</h3>
        <div id="heatmap" class="heatmap"></div>
    </section>
</div>
<div class="grid-2" style="margin-top:1rem">
    <section class="glass-card">
        <h3>⚡ Common Presets</h3>
        <div class="presets-grid" id="presets"></div>
    </section>
    <section class="glass-card">
        <h3>⭐ Favorites</h3>
        <div id="favorites"></div>
        <button class="btn btn-secondary btn-sm w-full" id="saveFavBtn" style="margin-top:.5rem">💾 Save Current</button>
    </section>
</div>
</main>
<script src="script.js"></script></body></html>
